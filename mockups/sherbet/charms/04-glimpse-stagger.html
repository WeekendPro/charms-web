<!-- @dsCard group="Gameplay" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Charms · Glimpse (staggered + border timers)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --vt-bg:#FFF7F0; --vt-bg-board:#FBEFE6; --vt-surface:#FFFFFF; --vt-surface-2:#FFF1E8;
  --vt-hairline:#F0E0D4; --vt-ink:#46383B; --vt-ink-soft:#9B8B8E; --vt-ink-faint:#CDBFC1;
  --vt-strawberry:#FF6B6B; --vt-tangerine:#FF9E45; --vt-lemon:#FFCE3A; --vt-lime:#5BC16E;
  --vt-teal:#1FC7B6; --vt-sky:#46AEF7; --vt-grape:#9B8CFF; --vt-bubblegum:#FF8FCF;
  --vt-life:#FF6B81; --vt-timer-calm:#46C7B6; --vt-timer-warn:#FFB13C; --vt-timer-hot:#FF6B6B;
  --vt-shadow-2:0 6px 14px rgba(217,150,120,.22); --vt-shadow-3:0 14px 30px rgba(214,140,110,.26);
  --vt-inset-top:inset 0 2px 0 rgba(255,255,255,.6); --vt-spring:cubic-bezier(.18,1.3,.4,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#EFE4DA;font-family:'Nunito',sans-serif;color:var(--vt-ink);
  min-height:100vh;display:grid;place-items:center;padding:20px}
.phone{width:390px;max-width:100%;background:var(--vt-bg);border-radius:42px;
  box-shadow:var(--vt-shadow-3);padding:18px 16px 26px;position:relative;overflow:hidden;min-height:760px;
  cursor:pointer;user-select:none}

/* HUD */
.hud{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 4px 12px}
.score{font-family:'Fredoka';font-weight:600;font-size:22px;font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:6px}
.score small{font-family:'Nunito';font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--vt-ink-soft)}
.lvl-pill{font-family:'Fredoka';font-weight:600;font-size:14px;background:var(--vt-surface);padding:6px 14px;border-radius:999px;box-shadow:var(--vt-shadow-2),var(--vt-inset-top)}
.lives{display:flex;gap:5px}
.heart{width:20px;height:20px;color:var(--vt-life);filter:drop-shadow(0 2px 2px rgba(255,107,129,.4))}

.banner{text-align:center;font-family:'Fredoka';font-weight:600;font-size:15px;margin:2px 0 10px}
.banner b{color:var(--vt-bubblegum)}

/* the Case */
.case{background:var(--vt-bg-board);border-radius:30px;padding:16px;
  box-shadow:inset 0 2px 10px rgba(180,120,90,.16);
  display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.setting{aspect-ratio:1;border-radius:50%;background:var(--vt-surface-2);border:1px solid var(--vt-hairline);
  box-shadow:inset 0 2px 4px rgba(180,120,90,.14),inset 0 -1px 0 rgba(255,255,255,.5);position:relative}

/* charm */
.charm{position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(160deg,#FFF7EE,#ECD9C8);padding:3px;
  box-shadow:0 6px 13px rgba(196,130,100,.30),var(--vt-inset-top);opacity:0;transform:scale(.3)}
.charm .enamel{width:100%;height:100%;border-radius:50%;position:relative;overflow:hidden;display:grid;place-items:center;
  background:radial-gradient(125% 125% at 32% 24%,rgba(255,255,255,.62),rgba(255,255,255,0) 46%),var(--c,#FF6B6B);
  box-shadow:inset 0 -6px 10px rgba(0,0,0,.18),inset 0 3px 4px rgba(255,255,255,.3)}
.charm .gloss{position:absolute;top:9%;left:17%;width:52%;height:33%;border-radius:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.85),rgba(255,255,255,0));z-index:1;pointer-events:none}
.charm .motif{position:relative;z-index:2;font-size:30px;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.16))}
/* shimmer sweep used during slip-away */
.charm .shimmer{position:absolute;inset:0;z-index:3;border-radius:50%;opacity:0;
  background:linear-gradient(115deg,rgba(255,255,255,0) 38%,rgba(255,255,255,.9) 50%,rgba(255,255,255,0) 62%);
  background-size:260% 100%;background-position:120% 0}

/* the per-charm BORDER TIMER ring — drains over one "bloom window" (2.08s),
   the same time a tetromino used to be lit + decay in the old game */
.charm .ring{position:absolute;inset:-3px;z-index:4;pointer-events:none;opacity:0;transform:rotate(-90deg)}
.charm .ring circle{fill:none}
.charm .ring .track{stroke:rgba(70,56,59,.10);stroke-width:5}
.charm .ring .fg{stroke:var(--vt-timer-calm);stroke-width:6;stroke-linecap:round;
  stroke-dasharray:289.03;stroke-dashoffset:0}

/* ---- lifecycle (driven by JS toggling .in / .out) ---- */
/* settle in — springy pop, no glow-bloom */
.charm.in{animation:settle .5s var(--vt-spring) both, breathe 2.6s ease-in-out .9s infinite}
@keyframes settle{0%{opacity:0;transform:scale(.3)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.018)}}
/* when live, reveal the ring and drain it (color warms teal→amber→coral as it empties) */
.charm.in .ring{opacity:1;animation:ringFade .35s ease both}
.charm.in .ring .fg{animation:drain 2.08s linear both, ringHue 2.08s linear both}
@keyframes ringFade{from{opacity:0}to{opacity:1}}
@keyframes drain{from{stroke-dashoffset:0}to{stroke-dashoffset:289.03}}
@keyframes ringHue{0%{stroke:var(--vt-timer-calm)}55%{stroke:var(--vt-timer-warn)}100%{stroke:var(--vt-timer-hot)}}

/* slip away — gentle lift + soft shimmer-fade (opacity), never a pop */
.charm.out{animation:slip .6s ease-in-out both}
.charm.out .ring{opacity:0;transition:opacity .25s ease}
.charm.out .shimmer{animation:sweep .6s ease-in-out both}
@keyframes slip{
  0%{opacity:1;transform:scale(1) translateY(0)}
  45%{opacity:.55;transform:scale(1.03) translateY(-2px)}
  100%{opacity:0;transform:scale(1.06) translateY(-5px)}
}
@keyframes sweep{0%{opacity:0;background-position:120% 0}40%{opacity:.85}100%{opacity:0;background-position:-60% 0}}

.foot{text-align:center;color:var(--vt-ink-faint);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:18px;line-height:1.7}
.tap-hint{opacity:.7;text-transform:none;letter-spacing:.02em;font-weight:600}

@media (prefers-reduced-motion: reduce){
  .charm.in{animation:none;opacity:1;transform:scale(1)}
  .charm.in .ring{opacity:1;animation:none}
  .charm.in .ring .fg{animation:none;stroke:var(--vt-timer-warn);stroke-dashoffset:130}
  .charm.out{animation:none;opacity:0}
  .charm .shimmer{animation:none!important;opacity:0}
}
</style>
</head>
<body>
<div class="phone" id="phone" title="tap to replay">
  <div class="hud">
    <div class="score">0<small>pts</small></div>
    <div class="lvl-pill">Round 3</div>
    <div class="lives">
      <svg class="heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.6-9.3-9C1 8.5 2.6 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.4 0 5 3.5 3.3 7C19 16.4 12 21 12 21z"/></svg>
      <svg class="heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.6-9.3-9C1 8.5 2.6 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.4 0 5 3.5 3.3 7C19 16.4 12 21 12 21z"/></svg>
      <svg class="heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.6-9.3-9C1 8.5 2.6 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.4 0 5 3.5 3.3 7C19 16.4 12 21 12 21z"/></svg>
    </div>
  </div>

  <div class="banner">Glimpse them as they arrive — <b>each one slips away fast!</b></div>

  <div class="case" id="case"></div>

  <div class="foot">
    charms arrive one by one · each has a 2.08s border timer
    <div class="tap-hint">tap to replay</div>
  </div>
</div>

<script>
const COLORS={
  strawberry:'#FF6B6B',tangerine:'#FF9E45',lemon:'#FFCE3A',lime:'#5BC16E',
  teal:'#1FC7B6',sky:'#46AEF7',grape:'#9B8CFF',bubblegum:'#FF8FCF'
};
// timings borrowed from the old Phosphor/VanishingTiles reveal curve:
//   BLOOM_MS = on-screen time per piece (flash + hold + decay)
//   STEP_MS  = gap between consecutive reveals (staggered, slightly overlapping)
const BLOOM_MS=2080, STEP_MS=1120, SLIP_MS=600, REPLAY_GAP_MS=1100;

// 6 charms scattered across the 25 Settings; `order` drives the staggered arrival
const charms=[
  {i:2, col:'strawberry',m:'🍓',order:0},
  {i:6, col:'sky',       m:'💧',order:1},
  {i:9, col:'lemon',     m:'🍋',order:2},
  {i:12,col:'bubblegum', m:'🌸',order:3},
  {i:18,col:'grape',     m:'⭐',order:4},
  {i:21,col:'lime',      m:'🐝',order:5},
];

const caseEl=document.getElementById('case');
const charmEls={};
for(let s=0;s<25;s++){
  const slot=document.createElement('div');slot.className='setting';
  const ch=charms.find(x=>x.i===s);
  if(ch){
    const el=document.createElement('div');el.className='charm';
    el.innerHTML=
      '<span class="enamel" style="--c:'+COLORS[ch.col]+'">'+
        '<span class="gloss"></span>'+
        '<span class="motif">'+ch.m+'</span>'+
        '<span class="shimmer"></span>'+
      '</span>'+
      '<svg class="ring" viewBox="0 0 100 100">'+
        '<circle class="track" cx="50" cy="50" r="46"></circle>'+
        '<circle class="fg" cx="50" cy="50" r="46"></circle>'+
      '</svg>';
    slot.appendChild(el);
    charmEls[ch.order]=el;
  }
  caseEl.appendChild(slot);
}

let timers=[];
function clearTimers(){timers.forEach(clearTimeout);timers=[];}
function later(fn,ms){timers.push(setTimeout(fn,ms));}

function runSequence(){
  clearTimers();
  // reset all charms
  charms.forEach(ch=>{const el=charmEls[ch.order];el.classList.remove('in','out');});
  // force reflow so re-adding classes restarts the animations
  void caseEl.offsetWidth;

  let lastExit=0;
  charms.forEach(ch=>{
    const el=charmEls[ch.order];
    const arrive=ch.order*STEP_MS;       // staggered entrance
    const exit=arrive+BLOOM_MS;          // border timer empties → slip away
    later(()=>el.classList.add('in'),arrive);
    later(()=>{el.classList.remove('in');el.classList.add('out');},exit);
    lastExit=Math.max(lastExit,exit+SLIP_MS);
  });

  // loop the demo
  later(runSequence,lastExit+REPLAY_GAP_MS);
}

document.getElementById('phone').addEventListener('click',runSequence);
runSequence();
</script>
</body>
</html>
