<!-- @dsCard group="Brand & Onboarding" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Charms · Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --vt-bg:#FFF7F0; --vt-bg-board:#FBEFE6; --vt-surface:#FFFFFF; --vt-surface-2:#FFF1E8;
  --vt-hairline:#F0E0D4; --vt-ink:#46383B; --vt-ink-soft:#9B8B8E; --vt-ink-faint:#CDBFC1;
  --vt-strawberry:#FF6B6B; --vt-tangerine:#FF9E45; --vt-lemon:#FFCE3A; --vt-lime:#5BC16E;
  --vt-teal:#1FC7B6; --vt-sky:#46AEF7; --vt-grape:#9B8CFF; --vt-bubblegum:#FF8FCF;
  --vt-success:#2FD09B; --vt-life:#FF6B81; --vt-star:#FFCE3A;
  --vt-shadow-2:0 6px 14px rgba(217,150,120,.22); --vt-shadow-3:0 14px 30px rgba(214,140,110,.26);
  --vt-inset-top:inset 0 2px 0 rgba(255,255,255,.6); --vt-spring:cubic-bezier(.18,1.3,.4,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#EFE4DA;font-family:'Nunito',sans-serif;color:var(--vt-ink);
  min-height:100vh;display:grid;place-items:center;padding:20px}
.phone{width:390px;max-width:100%;border-radius:42px;box-shadow:var(--vt-shadow-3);
  padding:0;position:relative;overflow:hidden;min-height:760px;
  background:radial-gradient(120% 70% at 50% 0%,#FFF4E9 0%,#FFEFE0 55%,#FFE8D6 100%)}
.wrap{position:relative;z-index:2;padding:30px 24px 28px;display:flex;flex-direction:column;
  align-items:center;min-height:760px}

/* charm treatment */
.charm{position:relative;aspect-ratio:1;border-radius:50%;
  background:linear-gradient(160deg,#FFF7EE,#ECD9C8);padding:3px;
  box-shadow:0 7px 14px rgba(196,130,100,.30),var(--vt-inset-top)}
.charm .enamel{width:100%;height:100%;border-radius:50%;position:relative;overflow:hidden;
  display:grid;place-items:center;
  background:radial-gradient(125% 125% at 32% 24%,rgba(255,255,255,.62),rgba(255,255,255,0) 46%),var(--c,#FF6B6B);
  box-shadow:inset 0 -6px 10px rgba(0,0,0,.18),inset 0 3px 4px rgba(255,255,255,.3)}
.charm .gloss{position:absolute;top:9%;left:17%;width:52%;height:33%;border-radius:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.85),rgba(255,255,255,0));z-index:1;pointer-events:none}
.charm .motif{position:relative;z-index:2;font-size:var(--ms,26px);line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.16))}

/* top bar */
.top{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:18px}
.coins{display:flex;align-items:center;gap:7px;background:#fff;border-radius:999px;padding:7px 13px 7px 9px;
  box-shadow:var(--vt-shadow-2),var(--vt-inset-top);font-family:'Fredoka';font-weight:600;font-size:15px}
.coins .dot{width:22px;height:22px}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(160deg,#FFD3EC,#FF8FCF);
  box-shadow:var(--vt-shadow-2),var(--vt-inset-top);display:grid;place-items:center;font-size:20px}

/* hero brand + mascot */
.hero{display:flex;flex-direction:column;align-items:center;margin:14px 0 8px}
.bigcharm{width:120px;margin-bottom:18px;animation:pop .7s var(--vt-spring) both}
.bigcharm .motif{--ms:58px}
@keyframes pop{0%{transform:scale(0) rotate(-14deg)}60%{transform:scale(1.12) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.brand{font-family:'Fredoka';font-weight:700;font-size:46px;letter-spacing:.05em;margin:0;
  background:linear-gradient(180deg,#FF8FCF,#FF6B6B);-webkit-background-clip:text;background-clip:text;color:transparent;
  animation:rise .5s var(--vt-spring) .12s both}
.sub{color:var(--vt-ink-soft);font-weight:600;font-size:14px;margin:6px 0 0;animation:rise .5s var(--vt-spring) .2s both}
@keyframes rise{0%{transform:translateY(12px);opacity:0}100%{transform:translateY(0);opacity:1}}

/* difficulty selector */
.seg-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--vt-ink-soft);
  margin:30px 0 10px;text-align:center;width:100%}
.seg{display:flex;gap:8px;width:100%;background:var(--vt-surface-2);border:1.5px solid var(--vt-hairline);
  border-radius:18px;padding:5px}
.seg button{flex:1;border:none;background:none;border-radius:13px;padding:11px 0;cursor:pointer;
  font-family:'Fredoka';font-weight:600;font-size:15px;color:var(--vt-ink-soft);display:flex;
  flex-direction:column;align-items:center;gap:5px;transition:transform .12s}
.seg button:active{transform:scale(.96)}
.seg button .pips{display:flex;gap:3px}
.seg button .pips i{width:6px;height:6px;border-radius:50%;background:var(--vt-ink-faint)}
.seg button.on{background:#fff;color:var(--vt-ink);box-shadow:var(--vt-shadow-2),var(--vt-inset-top)}
.seg button.on .pips i{background:var(--vt-bubblegum)}
.seg button.on .pips i.off{background:var(--vt-ink-faint)}

/* PLAY */
.play{margin-top:18px;width:100%;font-family:'Fredoka';font-weight:700;font-size:24px;color:#fff;border:none;
  background:linear-gradient(180deg,#43E0AB,#2FD09B);padding:20px 0;border-radius:26px;cursor:pointer;
  box-shadow:0 12px 24px rgba(47,208,155,.4),var(--vt-inset-top);letter-spacing:.03em;transition:transform .12s}
.play:active{transform:scale(.97)}
.play .ico{margin-left:8px}

/* bracelet peek */
.bracelet{margin-top:24px;width:100%;background:#fff;border-radius:24px;box-shadow:var(--vt-shadow-2);
  padding:16px 16px 18px}
.bhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.bhead h4{margin:0;font-family:'Fredoka';font-weight:600;font-size:15px}
.bhead a{font-size:12px;font-weight:700;color:var(--vt-bubblegum);text-decoration:none}
.strand{display:flex;align-items:center;gap:8px;overflow:hidden}
.strand .charm{width:46px;flex:none}
.strand .charm.locked{filter:grayscale(.9) opacity(.5)}
.strand .more{font-family:'Fredoka';font-weight:600;font-size:13px;color:var(--vt-ink-soft);flex:none;margin-left:2px}
</style>
</head>
<body>
<div class="phone">
  <div class="wrap">
    <div class="top">
      <div class="coins">
        <span class="charm dot" style="--c:var(--vt-lemon)"><span class="gloss"></span><span class="enamel" style="--c:var(--vt-lemon)"><span class="motif" style="--ms:12px">⭐</span></span></span>
        128
      </div>
      <div class="avatar">🧸</div>
    </div>

    <div class="hero">
      <div class="charm bigcharm" style="--c:var(--vt-bubblegum)"><span class="gloss"></span><span class="enamel" style="--c:var(--vt-bubblegum)"><span class="motif">🍓</span></span></div>
      <h1 class="brand">CHARMS</h1>
      <p class="sub">A cozy little memory game</p>
    </div>

    <div class="seg-label">Difficulty</div>
    <div class="seg">
      <button><span>Easy</span><span class="pips"><i></i><i class="off"></i><i class="off"></i></span></button>
      <button class="on"><span>Medium</span><span class="pips"><i></i><i></i><i class="off"></i></span></button>
      <button><span>Hard</span><span class="pips"><i></i><i></i><i></i></span></button>
    </div>

    <button class="play">Play<span class="ico">▶</span></button>

    <div class="bracelet">
      <div class="bhead"><h4>Your Bracelet</h4><a>See all →</a></div>
      <div class="strand" id="strand"></div>
    </div>
  </div>
</div>

<script>
const C=['#FF6B6B','#FF9E45','#FFCE3A','#5BC16E','#1FC7B6','#46AEF7','#9B8CFF','#FF8FCF'];
const M=['🍓','🐝','🍋','🌸','🌊','💎','⭐','🦋'];
const strand=document.getElementById('strand');
for(let i=0;i<6;i++){
  const d=document.createElement('div');
  d.className='charm'+(i>3?' locked':'');d.style.setProperty('--c',C[i]);
  d.innerHTML='<span class="gloss"></span><span class="enamel" style="--c:'+C[i]+'"><span class="motif" style="--ms:22px">'+(i>3?'❔':M[i])+'</span></span>';
  strand.appendChild(d);
}
const more=document.createElement('span');more.className='more';more.textContent='+22';strand.appendChild(more);
</script>
</body>
</html>
